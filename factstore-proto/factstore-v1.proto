syntax = "proto3";

package io.factstore.server.grpc;

option java_package = "io.factstore.grpc.v1";
option java_outer_classname = "FactStoreProto";

import "google/protobuf/timestamp.proto";

// ─── Common Messages ──────────────────────────────────────────────────────────

message Fact {
  string id = 1;
  string type = 2;
  string subject = 3;
  google.protobuf.Timestamp appended_at = 4;
  FactPayload payload = 5;
  map<string, string> metadata = 6;
  map<string, string> tags = 7;
}

// Opaque fact data. format and schema_ref are optional hints for deserialization.
message FactPayload {
  bytes data = 1;
  optional string format = 2;     // e.g. "json", "avro", "protobuf"
  optional string schema_ref = 3; // schema registry reference
}

message StoreInfo {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

enum ReadDirection {
  FORWARD = 0;  // oldest to newest (default)
  BACKWARD = 1; // newest to oldest
}

// ─── Tag Query ────────────────────────────────────────────────────────────────
//
// A TagQuery is a list of items evaluated with OR semantics: a fact matches if
// it satisfies at least one item. Within each item, all tags/types are ANDed.

message TagQuery {
  repeated TagQueryItem items = 1;
}

message TagQueryItem {
  oneof kind {
    TagOnlyItem tag_only = 1;
    TagTypeItem tag_type = 2;
  }
}

// Matches facts that have all specified tags, regardless of type.
message TagOnlyItem {
  map<string, string> tags = 1;
}

// Matches facts whose type is in `types` AND that have all specified tags.
message TagTypeItem {
  repeated string types = 1;
  map<string, string> tags = 2;
}

// ─── Append Condition ─────────────────────────────────────────────────────────

// If absent on an AppendFactsRequest, no condition is applied.
message AppendCondition {
  oneof kind {
    ExpectedLastFact expected_last_fact = 1;
    TagQueryBasedCondition tag_query_based = 2;
    All all = 3;
  }
}

// Composite condition: all nested conditions must hold (logical AND). Conditions
// may be nested arbitrarily. A multi-subject expectation is expressed as an
// `All` of several `ExpectedLastFact` conditions.
message All {
  repeated AppendCondition conditions = 1;
}

// Append succeeds only if the last fact for `subject` has the given ID.
// If expected_last_fact_id is absent, the condition requires no previous fact.
message ExpectedLastFact {
  string subject = 1;
  optional string expected_last_fact_id = 2;
}

// Append fails if any fact matching `fail_if_events_match` exists after `after_fact_id`.
message TagQueryBasedCondition {
  TagQuery fail_if_events_match = 1;
  optional string after_fact_id = 2;
}

// ─── Shared Outcome Messages ──────────────────────────────────────────────────

// The store with the given name does not exist.
message StoreNotFound {
  string store_name = 1;
}

// The fact with the requested ID does not exist.
message FactNotFound {}

// A set of facts (possibly empty) satisfying a query.
message FactsFound {
  repeated Fact facts = 1;
}

// The fact with the given ID does not exist in the store.
message FactAbsent {}

// ─── Store Service ────────────────────────────────────────────────────────────

service StoreService {
  rpc CreateStore(CreateStoreRequest) returns (CreateStoreResponse);
  rpc GetStore(GetStoreRequest) returns (GetStoreResponse);
  rpc ListStores(ListStoresRequest) returns (ListStoresResponse);
  rpc DeleteStore(DeleteStoreRequest) returns (DeleteStoreResponse);
  rpc StoreExists(StoreExistsRequest) returns (StoreExistsResponse);
}

// -- CreateStore --

message CreateStoreRequest {
  // Must match: ^[a-zA-Z]([a-zA-Z0-9_-]{0,253}[a-zA-Z0-9])?$|^[a-zA-Z]$
  string name = 1;
}

message CreateStoreResponse {
  oneof outcome {
    StoreCreated created = 1;
    StoreNameAlreadyExists name_already_exists = 2;
  }
}

message StoreCreated {
  string id = 1; // UUID of the created store
}

message StoreNameAlreadyExists {}

// -- GetStore --

message GetStoreRequest {
  string name = 1;
}

message GetStoreResponse {
  oneof outcome {
    StoreFound found = 1;
    StoreNotFound not_found = 2;
  }
}

message StoreFound {
  StoreInfo store = 1;
}

// -- ListStores --

message ListStoresRequest {}

message ListStoresResponse {
  repeated StoreInfo stores = 1;
}

// -- DeleteStore --

message DeleteStoreRequest {
  string name = 1;
}

message DeleteStoreResponse {
  oneof outcome {
    StoreDeleted deleted = 1;
    StoreNotFound not_found = 2;
  }
}

message StoreDeleted {}

// -- StoreExists --

message StoreExistsRequest {
  string name = 1;
}

message StoreExistsResponse {
  oneof outcome {
    StorePresent present = 1;
    StoreAbsent absent = 2;
  }
}

message StorePresent {}
message StoreAbsent {}

// ─── Fact Service ─────────────────────────────────────────────────────────────

service FactService {
  // Append one or more facts to a store, with optional idempotency and condition.
  rpc AppendFacts(AppendFactsRequest) returns (AppendFactsResponse);

  // Retrieve a single fact by its ID.
  rpc GetFact(GetFactRequest) returns (GetFactResponse);

  // Check whether a fact with the given ID exists.
  rpc FactExists(FactExistsRequest) returns (FactExistsResponse);

  // Find all facts for a subject, with optional limit and direction.
  rpc FindFactsBySubject(FindFactsBySubjectRequest) returns (FindFactsBySubjectResponse);

  // Find facts whose tags match ALL the specified key-value pairs.
  rpc FindFactsByTags(FindFactsByTagsRequest) returns (FindFactsByTagsResponse);

  // Find facts using a compound tag query (OR of AND-clauses, optionally filtered by type).
  rpc QueryFacts(QueryFactsRequest) returns (QueryFactsResponse);

  // Find facts within a half-open time range [from, to).
  rpc FindFactsInTimeRange(FindFactsInTimeRangeRequest) returns (FindFactsInTimeRangeResponse);

  // Open a live subscription: emit existing facts from the start position and then
  // continue emitting new facts as they are appended. The stream never completes on
  // its own. Facts are delivered in batches for higher throughput. Pre-stream errors
  // (store not found, after_fact_id not found) are delivered as the first and only
  // StreamFactsResponse message, after which the stream completes normally; terminal
  // failures that occur once facts are already flowing are surfaced as gRPC status errors.
  rpc SubscribeFacts(SubscribeFactsRequest) returns (stream StreamFactsResponse);

  // Open a bounded replay: emit existing facts from the start position up to the head
  // pinned at call time, then complete. Facts appended during the replay are excluded.
  // Error and batching semantics mirror SubscribeFacts.
  rpc ReplayFacts(ReplayFactsRequest) returns (stream StreamFactsResponse);
}

// -- AppendFacts --

// Input shape for a single fact to be appended.
message FactInput {
  string type = 1;
  string subject = 2;
  FactPayload payload = 3;
  map<string, string> metadata = 4;
  map<string, string> tags = 5;
}

message AppendFactsRequest {
  string store_name = 1;
  repeated FactInput facts = 2;
  optional string idempotency_key = 3; // UUID; auto-generated if absent
  optional AppendCondition condition = 4;
}

message AppendFactsResponse {
  oneof outcome {
    FactsAppended appended = 1;
    AlreadyApplied already_applied = 2;
    ConditionViolated condition_violated = 3;
    StoreNotFound store_not_found = 4;
  }
}

message FactsAppended {
  // Ids assigned by the server to the appended facts, in the same order as the
  // request's facts (fact_ids[i] corresponds to the i-th input fact).
  repeated string fact_ids = 1;
  // Shared ingestion timestamp assigned to all facts in this append.
  google.protobuf.Timestamp appended_at = 2;
}
message AlreadyApplied {}
message ConditionViolated {}

// -- GetFact --

message GetFactRequest {
  string store_name = 1;
  string fact_id = 2;
}

message GetFactResponse {
  oneof outcome {
    FactFound found = 1;
    FactNotFound not_found = 2;
    StoreNotFound store_not_found = 3;
  }
}

message FactFound {
  Fact fact = 1;
}

// -- FactExists --

message FactExistsRequest {
  string store_name = 1;
  string fact_id = 2;
}

message FactExistsResponse {
  oneof outcome {
    FactPresent present = 1;
    FactAbsent absent = 2;
    StoreNotFound store_not_found = 3;
  }
}

message FactPresent {}

// -- FindFactsBySubject --

message FindFactsBySubjectRequest {
  string store_name = 1;
  string subject = 2;
  optional int32 limit = 3;
  ReadDirection direction = 4;
}

message FindFactsBySubjectResponse {
  oneof outcome {
    FactsFound found = 1;
    StoreNotFound store_not_found = 2;
  }
}

// -- FindFactsByTags --

message FindFactsByTagsRequest {
  string store_name = 1;
  map<string, string> tags = 2; // all tags must match (AND semantics)
  optional int32 limit = 3;
  ReadDirection direction = 4;
}

message FindFactsByTagsResponse {
  oneof outcome {
    FactsFound found = 1;
    StoreNotFound store_not_found = 2;
  }
}

// -- QueryFacts --

message QueryFactsRequest {
  string store_name = 1;
  TagQuery query = 2;
}

message QueryFactsResponse {
  oneof outcome {
    FactsFound found = 1;
    StoreNotFound store_not_found = 2;
  }
}

// -- FindFactsInTimeRange --

message FindFactsInTimeRangeRequest {
  string store_name = 1;
  optional google.protobuf.Timestamp from = 2; // inclusive; absent = no lower bound
  optional google.protobuf.Timestamp to = 3;   // exclusive; absent = no upper bound
  optional int32 limit = 4;
  ReadDirection direction = 5;
}

message FindFactsInTimeRangeResponse {
  oneof outcome {
    FactsFound found = 1;
    StoreNotFound store_not_found = 2;
  }
}

// -- StreamFacts --

// A batch of facts delivered in a single stream message for higher throughput.
message FactBatch {
  repeated Fact facts = 1;
}

// Envelope for each StreamFacts stream message: either a batch of facts or a
// pre-stream error. Mirrors the oneof-outcome pattern used by the unary RPCs so
// that business errors are typed data rather than out-of-band status codes.
message StreamFactsResponse {
  oneof message {
    FactBatch batch = 1;
    StoreNotFound store_not_found = 2;
    FactNotFound after_fact_not_found = 3; // the after_fact_id cursor does not exist
  }
}

// Marker for streaming from the very first fact in the store.
message FromBeginning {}
// Marker for subscribing only to facts appended after the subscription is opened.
message FromEnd {}

message SubscribeFactsRequest {
  string store_name = 1;
  // If start_position is not set, the subscription starts from the beginning (equivalent to from_beginning).
  oneof start_position {
    FromBeginning from_beginning = 2;
    FromEnd from_end = 3;
    // Subscribe to facts appended after the given fact ID, then continue with new ones.
    string after_fact_id = 4;
  }
}

message ReplayFactsRequest {
  string store_name = 1;
  // If start is not set, the replay starts from the beginning (equivalent to from_beginning).
  // There is deliberately no from_end: replaying "from the end" would always be empty.
  oneof start {
    FromBeginning from_beginning = 2;
    // Replay facts appended after the given fact ID, up to the pinned head.
    string after_fact_id = 3;
  }
}

// ─── Info Service ─────────────────────────────────────────────────────────────

service InfoService {
  rpc GetServerInfo(GetServerInfoRequest) returns (ServerInfo);
}

message GetServerInfoRequest {}

message ServerInfo {
  string app = 1;
  string version = 2;
  string storage_backend = 3;
}
