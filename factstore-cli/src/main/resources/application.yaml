quarkus:
  banner:
    enabled: false
  log:
    level: WARN
    category:
      "io.factstore.cli":
        level: INFO
    console:
      format: "%m%n"
  package:
    jar:
      enabled: true
  rest-client:
    user-agent: FactStore-CLI/1.0

"%dev":
  quarkus:
    log:
      level: INFO
      category:
        "io.factstore.cli":
          level: DEBUG
      console:
        format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
    rest-client:
      logging:
        scope: request-response
        body-limit: 100
      extensions-api:
        logging:
          scope: all
